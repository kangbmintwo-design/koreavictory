<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 멕시코 vs 한국 승부예측</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05000a;color:#fff;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:60px}
img{width:100%;display:block}
.page{display:none}
.page.active{display:block}
/* HERO */
.hero{position:relative;background:#05000a}
.hero-badge{position:absolute;top:14px;left:16px;background:rgba(180,0,0,0.92);font-size:10px;font-weight:800;letter-spacing:2px;padding:5px 14px;border-radius:20px;text-transform:uppercase;z-index:2}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(5,0,10,1) 0%,rgba(5,0,10,0.7) 40%,transparent 100%);padding:28px 18px 18px;z-index:2}
.hero-vs{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.hero-vs .flag{font-size:40px;line-height:1}
.hero-vs .vs{font-size:20px;font-weight:900;color:#333;letter-spacing:3px}
h1{font-size:26px;font-weight:900;margin-bottom:3px}
h1 span{color:#cc0000}
.hero-sub{font-size:11px;color:#aaa}
/* INFO */
.info-strip{display:flex;background:#0a0005;border-bottom:1px solid #1a001a;overflow-x:auto}
.info-strip div{padding:9px 14px;font-size:11px;color:#999;white-space:nowrap;border-right:1px solid #1a001a;flex-shrink:0}
/* STATS */
.stats-bar{margin:14px 14px 0;background:rgba(200,0,0,0.07);border:1px solid rgba(200,0,0,0.2);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:8px}
.stats-bar .cnt{color:#ff6b6b;font-size:13px;font-weight:700}
.stats-bar .pcts{display:flex;gap:10px;font-size:12px;flex:1;justify-content:flex-end}
/* FORM */
.card{margin:14px 14px 0;background:rgba(255,255,255,0.025);border:1px solid #1e001e;border-radius:16px;padding:20px 16px}
.card-title{font-size:16px;font-weight:900;padding-bottom:10px;border-bottom:2px solid #cc0000;margin-bottom:18px}
.field{margin-bottom:18px}
.lbl{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:7px;letter-spacing:1px;text-transform:uppercase}
.lbl .sub{font-weight:400;color:#333;text-transform:none}
input[type=text],input[type=password]{width:100%;background:rgba(255,255,255,0.05);border:1px solid #2a002a;border-radius:9px;color:#fff;font-size:16px;padding:12px 14px;outline:none;font-family:inherit}
input::placeholder{color:#444}
/* SCORE */
.score-row{display:flex;align-items:center;justify-content:center;gap:16px}
.team{text-align:center}
.team .flag{font-size:36px;margin-bottom:3px}
.team .name{font-size:10px;color:#555;margin-bottom:8px;letter-spacing:1px;font-weight:700}
.ctrl{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid #1e1e2e;border-radius:12px;padding:6px 10px}
.ctrl button{border:none;width:38px;height:38px;border-radius:8px;font-size:22px;font-weight:900;cursor:pointer}
.btn-g{background:#14532d;color:#4ade80}
.btn-r{background:#7f1d1d;color:#ff6b6b}
.score-n{font-size:38px;font-weight:900;min-width:44px;text-align:center;color:#fff}
.sep{font-size:30px;font-weight:900;color:#1a001a;padding-top:22px}
.res{text-align:center;margin-top:10px;font-weight:800;font-size:14px;min-height:20px}
/* SCORER */
.scorer-row{margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{flex:1;min-width:0;background:rgba(255,255,255,0.05);border:1px solid #2a002a;border-radius:8px;color:#fff;font-size:14px;padding:10px 10px;outline:none;font-family:inherit}
select option{background:#1a000a}
.rm-btn{background:rgba(204,0,0,0.15);border:none;color:#f87171;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:12px;flex-shrink:0}
.custom-input{width:100%;margin-top:6px;background:rgba(255,255,255,0.07);border:1px solid #cc0000;border-radius:8px;color:#fff;font-size:14px;padding:10px 12px;outline:none;font-family:inherit}
.add-btn{background:transparent;border:1px dashed #2a002a;color:#444;font-size:12px;border-radius:8px;padding:7px 14px;cursor:pointer;margin-top:4px;font-family:inherit}
/* SUBMIT */
.submit{width:100%;background:linear-gradient(90deg,#7b0000,#cc0000,#ef4444);border:none;color:#fff;font-weight:900;font-size:16px;padding:15px;border-radius:11px;cursor:pointer;box-shadow:0 6px 24px rgba(220,38,38,0.45);font-family:inherit;margin-top:2px}
.submit:disabled{background:#1a000a;box-shadow:none;cursor:not-allowed}
.err{color:#f87171;font-size:13px;margin-bottom:10px}
/* SUCCESS */
.success{text-align:center;padding:24px 0}
.success .emoji{font-size:50px;margin-bottom:10px}
.success .sname{color:#999;font-size:13px;margin-bottom:4px}
.success .sname strong{color:#ffd700;font-size:16px}
.success .sscore{font-size:38px;font-weight:900;letter-spacing:3px;margin:10px 0;display:flex;align-items:center;justify-content:center;gap:12px}
.success .sres{font-weight:800;font-size:15px;margin-bottom:4px}
.success .smsg{color:#444;font-size:12px;margin-bottom:18px}
.retry{background:transparent;border:1px solid #2a002a;color:#777;font-size:13px;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:inherit}
/* FRIENDS */
.friends{margin:14px 14px 0;background:rgba(255,255,255,0.015);border:1px solid #150008;border-radius:12px;padding:14px}
.friends h4{font-size:11px;font-weight:700;color:#440020;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.f-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #0f0008;gap:8px;font-size:13px}
.f-row:last-child{border-bottom:none}
.f-num{color:#2a0010;font-size:10px;min-width:16px;text-align:right;font-weight:600}
.f-name{font-weight:700;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-score{font-weight:900;font-size:14px;letter-spacing:2px;white-space:nowrap}
.f-res{font-size:10px;font-weight:700;min-width:60px;text-align:right;white-space:nowrap}
/* ADMIN */
.admin-link{display:block;margin:20px auto 0;background:transparent;border:none;color:#1a001a;font-size:12px;cursor:pointer;padding:6px;font-family:inherit}
.admin-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:1px solid #1a001a;padding-bottom:14px}
.admin-hdr h1{font-size:18px;font-weight:800}
.admin-hdr p{color:#555;font-size:12px;margin-top:3px}
.back-btn{background:transparent;border:1px solid #2a002a;color:#666;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;background:#0a000a;border-radius:8px;padding:10px 12px}
.stat-card .n{font-size:22px;font-weight:900;color:#fff}
.stat-card .l{font-size:10px;color:#555;margin-top:1px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:460px}
thead tr{background:#08000a}
th{padding:9px 10px;text-align:left;color:#444;font-weight:600;font-size:10px;border-bottom:1px solid #1a001a;white-space:nowrap}
tbody tr:nth-child(odd){background:#08000a}
tbody tr:nth-child(even){background:#0f000f}
td{padding:9px 10px;color:#ccc;border-bottom:1px solid #0a000a;vertical-align:middle}
.del{background:transparent;border:none;color:#2a002a;cursor:pointer;font-size:14px}
.refresh{display:block;margin:18px auto 0;background:transparent;border:1px solid #2a002a;color:#444;font-size:12px;padding:7px 18px;border-radius:8px;cursor:pointer;font-family:inherit}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#0f000f;border:1px solid #2a003a;border-radius:16px;padding:36px 28px;text-align:center;width:260px}
.login-box h2{color:#fff;font-size:17px;margin-bottom:18px;font-weight:800}
.login-box input{text-align:center}
.login-btn{width:100%;background:linear-gradient(90deg,#7b0000,#cc0000);border:none;color:#fff;font-weight:800;font-size:15px;padding:12px;border-radius:8px;cursor:pointer;margin-top:10px;font-family:inherit}
.login-back{background:transparent;border:none;color:#444;font-size:12px;cursor:pointer;margin-top:12px;padding:5px;font-family:inherit;display:block;width:100%}
.login-err{color:#f87171;font-size:12px;margin-top:5px}
.player-img{background:#05000a;margin-top:14px}
</style>
</head>

  </div>
  <div class="stat-row" id="admin-stats"></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>이름</th><th>스코어</th><th>결과</th><th>득점예측자</th><th>시간</th><th></th></tr></thead>
    <tbody id="admin-tbody"></tbody>
  </table></div>
  <div id="admin-empty" style="text-align:center;color:#333;padding:40px 0;display:none">아직 예측이 없습니다.</div>
  <button class="refresh" onclick="loadPreds()">🔄 새로고침</button>
</div>

<script>
const MK = "$2a$10$eeqiAHPRbjl8SCgzL5SaI.cHj4porQQNKIhycyYvTTK8d3cSMaM7.";
const BIN_KEY = "mex_bin_v4";
const ADMIN_PW = "korea2026";
const PLAYERS = ["손흥민","이강인","황인범","이재성","이기혁","백승호","설영우","이태석","이한범","김민재","김승규","황희찬","조규성","이동경","엄지성","김태현","송범근"];

let mexScore = 0, korScore = 0;
let scorers = [""];
let preds = [];
let binId = localStorage.getItem(BIN_KEY) || null;

function gr(m,k) {
  if(k>m) return {t:"🇰🇷 한국 승",c:"#ff4444"};
  if(m>k) return {t:"🇲🇽 멕시코 승",c:"#22c55e"};
  return {t:"⚖️ 무승부",c:"#aaa"};
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function showAdmin() { showPage('login'); }

function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW) {
    document.getElementById('login-err').style.display = 'none';
    showPage('admin');
    loadAdminTable();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function chg(which, delta) {
  if(which === 'mex') {
    mexScore = Math.max(0, Math.min(15, mexScore + delta));
    document.getElementById('mex-n').textContent = mexScore;
  } else {
    korScore = Math.max(0, Math.min(15, korScore + delta));
    document.getElementById('kor-n').textContent = korScore;
  }
  const r = gr(mexScore, korScore);
  const el = document.getElementById('res-preview');
  el.textContent = r.t;
  el.style.color = r.c;
}

function renderScorers() {
  const wrap = document.getElementById('scorers-wrap');
  wrap.innerHTML = '';
  scorers.forEach((s, i) => {
    const isCustom = s === '__custom__' || (!PLAYERS.includes(s) && s !== '');
    const sv = PLAYERS.includes(s) ? s : (s ? '__custom__' : '');
    const row = document.createElement('div');
    row.className = 'scorer-row';
    const opts = PLAYERS.map(p => `<option value="${p}"${p===s?' selected':''}>${p}</option>`).join('');
    row.innerHTML = `
      <select onchange="onSel(${i},this.value)">
        <option value=""${sv===''?' selected':''}>선수 선택</option>
        ${opts}
        <option value="__custom__"${sv==='__custom__'?' selected':''}>✏️ 직접 입력</option>
      </select>
      ${scorers.length>1 ? `<button class="rm-btn" onclick="rmScorer(${i})">✕</button>` : ''}
    `;
    if(isCustom) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'custom-input';
      inp.placeholder = '선수 이름 직접 입력';
      inp.value = s === '__custom__' ? '' : s;
      inp.oninput = function() { scorers[i] = this.value || '__custom__'; };
      row.appendChild(inp);
    }
    wrap.appendChild(row);
  });
  document.getElementById('add-scorer-btn').style.display = scorers.length >= 5 ? 'none' : 'inline-block';
}

function onSel(i, v) { scorers[i] = v; renderScorers(); }
function rmScorer(i) { scorers.splice(i,1); if(!scorers.length) scorers=['']; renderScorers(); }
function addScorer() { if(scorers.length<5){scorers.push('');renderScorers();} }

async function handleSubmit() {
  const name = document.getElementById('input-name').value.trim();
  const errEl = document.getElementById('err-msg');
  if(!name) { errEl.textContent='이름을 입력해주세요.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    const entry = {
      id: Date.now(), name,
      mex: mexScore, kor: korScore,
      scorers: scorers.filter(s=>s&&s!=='__custom__'),
      time: new Date().toLocaleString('ko-KR')
    };
    const updated = [entry, ...preds];
    await savePreds(updated);
    preds = updated;
    updateStats();
    updateFriends();
    // show success
    const r = gr(mexScore, korScore);
    document.getElementById('s-name').textContent = name;
    document.getElementById('s-mex').textContent = mexScore;
    document.getElementById('s-kor').textContent = korScore;
    const sres = document.getElementById('s-res');
    sres.textContent = r.t; sres.style.color = r.c;
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-area').style.display = 'block';
  } catch(e) {
    errEl.textContent = '저장 실패. 다시 시도해주세요.';
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '🔥 예측 제출하기';
}

function resetForm() {
  mexScore=0; korScore=0; scorers=[''];
  document.getElementById('input-name').value = '';
  document.getElementById('mex-n').textContent = '0';
  document.getElementById('kor-n').textContent = '0';
  document.getElementById('res-preview').textContent = '⚖️ 무승부';
  document.getElementById('res-preview').style.color = '#aaa';
  renderScorers();
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('success-area').style.display = 'none';
}

function updateStats() {
  if(!preds.length) { document.getElementById('stats-bar').style.display='none'; return; }
  const total = preds.length;
  const kw = preds.filter(p=>p.kor>p.mex).length;
  const d = preds.filter(p=>p.kor===p.mex).length;
  const mw = preds.filter(p=>p.mex>p.kor).length;
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('stats-cnt').textContent = '🔥 '+total+'명 참여';
  document.getElementById('stats-pcts').innerHTML =
    `<span style="color:#ff6b6b">한국 ${Math.round(kw/total*100)}%</span>` +
    `<span style="color:#555">무 ${Math.round(d/total*100)}%</span>` +
    `<span style="color:#4ade80">멕시코 ${Math.round(mw/total*100)}%</span>`;
}

function updateFriends() {
  if(!preds.length) { document.getElementById('friends-box').style.display='none'; return; }
  document.getElementById('friends-box').style.display = 'block';
  const list = document.getElementById('friends-list');
  list.innerHTML = preds.slice(0,15).map((p,i)=>{
    const r = gr(p.mex,p.kor);
    return `<div class="f-row">
      <span class="f-num">${i+1}</span>
      <span class="f-name">${p.name}</span>
      <span class="f-score"><span style="color:#4ade80">${p.mex}</span><span style="color:#1a000a;margin:0 3px">:</span><span style="color:#ff6b6b">${p.kor}</span></span>
      <span class="f-res" style="color:${r.c}">${r.t}</span>
    </div>`;
  }).join('') + (preds.length>15?`<div style="color:#2a0010;font-size:12px;text-align:center;margin-top:8px">+${preds.length-15}명 더</div>`:'');
}

function loadAdminTable() {
  document.getElementById('admin-count').textContent = '총 '+preds.length+'명 참여';
  const total = preds.length;
  if(total) {
    const kw=preds.filter(p=>p.kor>p.mex).length, d=preds.filter(p=>p.kor===p.mex).length, mw=preds.filter(p=>p.mex>p.kor).length;
    document.getElementById('admin-stats').innerHTML =
      `<div class="stat-card" style="border-left:3px solid #cc0000"><div class="n">${kw}</div><div class="l">🇰🇷 한국 승</div></div>` +
      `<div class="stat-card" style="border-left:3px solid #444"><div class="n">${d}</div><div class="l">⚖️ 무승부</div></div>` +
      `<div class="stat-card" style="border-left:3px solid #166534"><div class="n">${mw}</div><div class="l">🇲🇽 멕시코 승</div></div>`;
  }
  const tbody = document.getElementById('admin-tbody');
  const empty = document.getElementById('admin-empty');
  if(!preds.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = preds.map((p,i)=>{
    const r=gr(p.mex,p.kor);
    return `<tr>
      <td style="color:#444;font-size:11px">${preds.length-i}</td>
      <td style="font-weight:700;color:#fff">${p.name}</td>
      <td style="font-weight:900;font-size:14px;letter-spacing:2px;white-space:nowrap"><span style="color:#4ade80">${p.mex}</span><span style="color:#1e001e;margin:0 5px">:</span><span style="color:#ff6b6b">${p.kor}</span></td>
      <td style="color:${r.c};font-weight:600;font-size:11px;white-space:nowrap">${r.t}</td>
      <td style="color:#777;font-size:11px">${p.scorers?.length?p.scorers.join(', '):'—'}</td>
      <td style="color:#333;font-size:10px;white-space:nowrap">${p.time}</td>
      <td><button class="del" onclick="delEntry(${p.id})">✕</button></td>
    </tr>`;
  }).join('');
}

// JSONBin
async function loadPreds() {
  try {
    if(!binId) {
      const r = await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':MK,'X-Bin-Name':'mex-v4','X-Bin-Private':'false'},body:JSON.stringify({preds:[]})});
      const d = await r.json();
      binId = d.metadata?.id;
      if(binId) localStorage.setItem(BIN_KEY, binId);
    } else {
      const r = await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{headers:{'X-Master-Key':MK}});
      const d = await r.json();
      preds = d.record?.preds || [];
    }
  } catch(e) { console.log('load error',e); }
  updateStats();
  updateFriends();
  if(document.getElementById('page-admin').classList.contains('active')) loadAdminTable();
}

async function savePreds(updated) {
  if(!binId) return;
  await fetch('https://api.jsonbin.io/v3/b/'+binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MK},body:JSON.stringify({preds:updated})});
}

async function delEntry(id) {
  preds = preds.filter(p=>p.id!==id);
  await savePreds(preds);
  loadAdminTable();
}

// INIT
renderScorers();
loadPreds();
</script>
</body>
</html>
